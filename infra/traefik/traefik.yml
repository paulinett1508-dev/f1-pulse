# ─────────────────────────────────────────────────────────
# Traefik — Configuração Estática
# ─────────────────────────────────────────────────────────

api:
  dashboard: true

# ── Entrypoints ─────────────────────────────────────────
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

# ── SSL via Let's Encrypt ───────────────────────────────
certificatesResolvers:
  letsencrypt:
    acme:
      email: seu-email@dominio.com   # TROQUE pelo seu email real
      storage: /acme.json
      httpChallenge:
        entryPoint: web

# ── Docker provider ─────────────────────────────────────
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false          # Só expõe containers com traefik.enable=true
    network: proxy
  file:
    directory: /dynamic
    watch: true

# ── Logs ────────────────────────────────────────────────
log:
  level: WARN

accessLog:
  filePath: /var/log/traefik/access.log
  bufferingSize: 100
